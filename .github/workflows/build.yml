name: Build VLC Player APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle*') }}
          restore-keys: gradle-

      - run: chmod +x gradlew

      - name: Download Gradle Wrapper
        run: |
          mkdir -p gradle/wrapper
          curl -L -o gradle/wrapper/gradle-wrapper.jar \
            https://raw.githubusercontent.com/gradle/gradle/v8.4.0/gradle/wrapper/gradle-wrapper.jar

      - name: Decode keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | tr -d '\n' | base64 -d > vlcplayer.keystore
          echo "Keystore size: $(wc -c < vlcplayer.keystore) bytes"

      - name: Set version from timestamp
        id: ts
        run: |
          CODE=$(date +%Y%m%d%H%M)
          echo "code=$CODE" >> $GITHUB_OUTPUT
          python3 -c "
import re
code = '$CODE'
with open('app/build.gradle', 'r') as f:
    content = f.read()
content = re.sub(r'versionCode\s+\d+', 'versionCode ' + code, content)
content = re.sub(r\"versionName\s+'[^']*'\", \"versionName '\" + code + \"'\", content)
with open('app/build.gradle', 'w') as f:
    f.write(content)
print('Version set to: ' + code)
"

      - name: Build Release APK
        run: ./gradlew assembleRelease --stacktrace
        env:
          KEYSTORE_PATH: ${{ github.workspace }}/vlcplayer.keystore
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ steps.ts.outputs.code }}
          name: "VLC Player v${{ steps.ts.outputs.code }}"
          body: "Auto build tu commit ${{ github.sha }}"
          files: app/build/outputs/apk/release/app-release.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
