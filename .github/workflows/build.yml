name: Build VLC Player APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: gradle-

      - name: Get version code
        id: version
        run: echo "code=$(date +%Y%m%d%H%M)" >> $GITHUB_OUTPUT

      - name: Update versionCode & versionName
        run: |
          sed -i "s/versionCode [0-9]*/versionCode ${{ steps.version.outputs.code }}/" app/build.gradle
          sed -i "s/versionName '[^']*'/versionName '${{ steps.version.outputs.code }}'/" app/build.gradle

      - run: chmod +x gradlew

      - name: Download Gradle Wrapper
        run: |
          mkdir -p gradle/wrapper
          curl -L -o gradle/wrapper/gradle-wrapper.jar \
            https://raw.githubusercontent.com/gradle/gradle/v8.4.0/gradle/wrapper/gradle-wrapper.jar

      - name: Build Release APK
        run: ./gradlew assembleRelease --stacktrace

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ steps.version.outputs.code }}
          name: "VLC Player v${{ steps.version.outputs.code }}"
          body: "Auto build from commit ${{ github.sha }}"
          files: app/build/outputs/apk/release/app-release.apk
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
